      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="profile-image">
          <a href="{% url "profile" %}">
            <a href="{% url "profile" %}">
              <img src="https://i.pravatar.cc/150" alt="" />
            </a>
          </a>
        </div>
        <!-- Notification Button with Badge -->
        <div class="position-relative">
          <button
            class="btn btn-outline rounded-circle p-0"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <i class="bi bi-bell fs-4"></i>
            <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            >
              3
              <span class="visually-hidden">unread notifications</span>
            </span>
          </button>

          <!-- Notifications Dropdown -->
          <div class="dropdown-menu dropdown-menu-end p-0" style="width: 350px">
            <div class="p-3 border-bottom">
              <h6 class="mb-0">الإشعارات</h6>
            </div>

            <div class="notifications-list text-end">
              <!-- Hotel Notification -->
              <a
                href="./listing-detail-hotel.html"
                class="dropdown-item p-3 border-bottom d-flex align-items-center"
              >
                <div class="flex-shrink-0">
                  <div class="rounded-circle bg-light p-2">
                    <i class="bi bi-building text-primary fs-5"></i>
                  </div>
                </div>
                <div class="ms-3">
                  <h6 class="mb-1 text-truncate">فندق الريتز كارلتون</h6>
                  <p class="mb-0 text-muted small">
                    تمت إضافة فندق جديد في منطقة وسط المدينة
                  </p>
                  <small class="text-muted">منذ 5 دقائق</small>
                </div>
              </a>

              <!-- Restaurant Notification -->
              <a
                href="./listing-detail-restaurant.html"
                class="dropdown-item p-3 border-bottom d-flex align-items-center"
              >
                <div class="flex-shrink-0">
                  <div class="rounded-circle bg-light p-2">
                    <i class="bi bi-cup-hot text-success fs-5"></i>
                  </div>
                </div>
                <div class="ms-3">
                  <h6 class="mb-1 text-truncate">مطعم البحر الأزرق</h6>
                  <p class="mb-0 text-muted small">
                    تم إضافة مطعم للمأكولات البحرية حديثاً
                  </p>
                  <small class="text-muted">منذ ساعة</small>
                </div>
              </a>

              <!-- Car Agency Notification -->
              <a
                href="./listing-detail-car-agency.html"
                class="dropdown-item p-3 d-flex align-items-center"
              >
                <div class="flex-shrink-0">
                  <div class="rounded-circle bg-light p-2">
                    <i class="bi bi-car-front text-warning fs-5"></i>
                  </div>
                </div>
                <div class="ms-3">
                  <h6 class="mb-1 text-truncate">وكالة السيارات الفاخرة</h6>
                  <p class="mb-0 text-muted small">
                    عروض جديدة على سيارات الدفع الرباعي
                  </p>
                  <small class="text-muted">منذ 3 ساعات</small>
                </div>
              </a>
            </div>

            <!-- View All Link -->
            <div class="p-2 border-top text-center">
              <a href="#" class="text-decoration-none text-primary">
                عرض كل الإشعارات
                <i class="bi bi-arrow-left ms-1"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
